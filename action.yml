name: Build and Tag
description: Properly tags your GitHub Action
runs:
  using: node24
  main: dist/index.js
branding:
  icon: archive
  color: blue
inputs:
  tag_name:
    description: The tag to update. If the workflow event is `release`, it will use the `tag_name` from the event payload.
  github_token:
    description: The GitHub token to authenticate API requests. If the workflow event is `release`, it will use the `GITHUB_TOKEN` secret.
