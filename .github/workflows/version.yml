name: Version

permissions:
  contents: write

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Check for version bypass label
        id: bypass
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | tr '[:upper:]' '[:lower:]')

          if echo "$LABELS" | grep -q 'skip-version'; then
            echo "should_bump=false" >> $GITHUB_OUTPUT
            echo "Version bump bypass label found; skipping version bump."
          else
            echo "should_bump=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup node
        if: steps.bypass.outputs.should_bump == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Configure Git
        if: steps.bypass.outputs.should_bump == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Determine version bump from labels
        if: steps.bypass.outputs.should_bump == 'true'
        id: bump
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | tr '[:upper:]' '[:lower:]')

          if echo "$LABELS" | grep -q '"major"'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"patch"'; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi
          
      - name: Read current version
        if: steps.bypass.outputs.should_bump == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate new version
        if: steps.bypass.outputs.should_bump == 'true'
        id: new_version
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ steps.bump.outputs.bump }}" in
            major)
              MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR+1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "value=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        if: steps.bypass.outputs.should_bump == 'true'
        run: |
          npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version
          git add package.json package-lock.json || true

      - name: Commit + tag
        if: steps.bypass.outputs.should_bump == 'true'
        run: |
          git commit -m "chore(release): ${{ steps.new_version.outputs.value }}"
          git tag -a "v${{ steps.new_version.outputs.value }}" -m "Release v${{ steps.new_version.outputs.value }}"

      - name: Push commit and tags
        if: steps.bypass.outputs.should_bump == 'true'
        run: |
          git push origin HEAD:main --follow-tags